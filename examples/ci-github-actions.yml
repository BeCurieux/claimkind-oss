# Lint product claims on every PR. Fails the build on high/critical findings.
name: claim-lint
on: [pull_request]

jobs:
  claimkind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm i -g @claimkind/cli @claimkind/pack-au-greenwashing
      - name: Lint claims
        run: |
          claimkind check "content/**/*.csv" \
            --pack au-greenwashing \
            --format junit \
            --fail-on high > claimkind-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: claimkind-results
          path: claimkind-results.xml
